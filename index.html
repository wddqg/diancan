<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>🍡 老婆小饭桌 · 点菜小程序</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
<style>
  :root{
    --pink:#FF9EBB;
    --pink-soft:#FFE3EC;
    --mint:#9FE3C5;
    --mint-soft:#E3F8EF;
    --cream:#FFF6E9;
    --lav:#C9B6E4;
    --lav-soft:#F0E9FA;
    --peach:#FFC59B;
    --ink:#5A4A52;
    --shadow:0 8px 20px rgba(255,158,187,.25);
    --shadow-lg:0 14px 34px rgba(201,182,228,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"ZCOOL KuaiLe","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--pink-soft) 0%,var(--lav-soft) 55%,var(--mint-soft) 100%);
    color:var(--ink);
    height:100%;
    display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  /* phone frame */
  .phone{
    width:100%;max-width:430px;
    height:100%;
    background:#fffdfb;
    position:relative;
    box-shadow:0 0 40px rgba(201,182,228,.3);
    overflow:hidden;overscroll-behavior:contain;
    display:grid;
    grid-template-rows:auto 1fr;
  }
  /* floating decorations: 浮在最上层飘动（pointer-events:none 不挡交互），让装饰可见 */
  .deco{position:absolute;font-size:26px;opacity:.5;pointer-events:none;animation:float 6s ease-in-out infinite;z-index:12;}
  .deco.d1{top:70px;left:14px;animation-delay:0s;}
  .deco.d2{top:130px;right:16px;animation-delay:1.2s;}
  .deco.d3{top:300px;left:10px;animation-delay:2.1s;}
  .deco.d4{top:420px;right:14px;animation-delay:.6s;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-10px) rotate(6deg);}}

  /* top bar */
  .topbar{
    padding:16px 18px 10px;
    background:linear-gradient(135deg,var(--pink),var(--lav));
    color:#fff;border-bottom-left-radius:26px;border-bottom-right-radius:26px;
    box-shadow:var(--shadow);
    position:relative;z-index:5;
  }
  .topbar h1{margin:0;font-size:24px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
  .topbar .sub{font-size:13px;opacity:.9;margin-top:2px;}
  .switch{display:flex;gap:8px;margin-top:12px;}
  .switch button{
    flex:1;border:none;cursor:pointer;
    padding:9px 0;border-radius:16px;font-family:inherit;font-size:15px;
    background:rgba(255,255,255,.35);color:#fff;transition:.2s;
  }
  .switch button.active{background:#fff;color:var(--pink);box-shadow:var(--shadow);}
  .switch button:active{transform:scale(.96);}

  /* body scroll area */
  .screen{grid-row:2;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 24px;position:relative;z-index:3;}
  .hidden{display:none !important;}

  /* category chips */
  /* 顾客视图头部：分类条 + 搜索框 吸顶固定，不被菜品/装饰遮挡 */
  .custHead{position:sticky;top:0;z-index:9;background:#fffdfb;padding:6px 0 8px;margin:0;}
  .custHead::before{content:"";position:absolute;left:0;right:0;top:-16px;height:16px;background:#fffdfb;z-index:-1;pointer-events:none;}   /* 向上延伸背景，盖住 .screen 顶部 padding 缝隙，避免漂浮 .deco 漏出 */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;border:none;cursor:pointer;font-family:inherit;font-size:14px;
    padding:7px 14px;border-radius:18px;background:var(--cream);color:var(--ink);transition:.2s;
    border:2px solid transparent;
  }
  .chip.active{background:var(--pink-soft);border-color:var(--pink);color:var(--pink);}

  /* dish card */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{
    background:#fff;border-radius:22px;padding:10px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;transition:.2s;position:relative;overflow:hidden;
  }
  .card:active{transform:scale(.98);}
  .card .img{
    width:100%;position:relative;border-radius:16px;background:var(--cream);overflow:hidden;
  }
  .card .img::before{content:"";display:block;padding-top:100%;}
  .card .img>*{
    position:absolute;top:0;right:0;bottom:0;left:0;width:100%;height:100%;object-fit:cover;
    display:flex;align-items:center;justify-content:center;font-size:46px;
  }
  .card .name{font-size:16px;margin:8px 2px 2px;}
  .card .desc{font-size:12px;color:#8a7a7a;line-height:1.3;min-height:28px;margin:0 2px;}
  .card .row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
  .price{color:var(--pink);font-size:18px;}
  .price small{font-size:12px;}
  .add{
    border:none;cursor:pointer;background:linear-gradient(135deg,var(--pink),var(--peach));
    color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;line-height:44px;
    box-shadow:var(--shadow);transition:.15s;
  }
  .add:active{transform:scale(.85);}
  .tag{position:absolute;top:10px;left:10px;background:var(--mint);color:#fff;font-size:11px;padding:3px 8px;border-radius:12px;}

  /* qty stepper inside cart */
  .stepper{display:flex;align-items:center;gap:8px;}
  .stepper button{width:44px;height:44px;border-radius:50%;border:none;background:var(--pink-soft);color:var(--pink);font-size:20px;cursor:pointer;}
  .stepper span{min-width:18px;text-align:center;}

  /* cart bar */
  .cartbar{
    position:absolute;left:0;right:0;bottom:0;
    width:100%;
    z-index:6;
    background:#fff;border-top-left-radius:24px;border-top-right-radius:24px;
    box-shadow:0 -8px 24px rgba(201,182,228,.3);
    display:flex;align-items:center;gap:12px;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
    transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s ease;
  }
  .cartbar.down{transform:translateY(110%);opacity:0;pointer-events:none;}
  .cartbar .info{flex:1;}
  .cartbar .total{font-size:20px;color:var(--pink);}
  .cartbar .count{font-size:12px;color:#8a7a7a;}
  .checkout{
    border:none;cursor:pointer;font-family:inherit;font-size:16px;color:#fff;
    background:linear-gradient(135deg,var(--pink),var(--lav));
    padding:12px 22px;border-radius:20px;box-shadow:var(--shadow-lg);transition:.15s;
  }
  .checkout:active{transform:scale(.95);}
  .cart-ico{position:relative;font-size:30px;}
  .badge{position:absolute;top:-6px;right:-8px;background:var(--peach);color:#fff;font-size:11px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
  /* 购物车栏左侧可点击区域：点开购物车详情 */
  .cart-trigger{
    flex:1;display:flex;align-items:center;gap:12px;cursor:pointer;
    background:none;border:none;padding:6px 4px;margin:-6px -4px;
    font-family:inherit;color:inherit;text-align:left;min-width:0;border-radius:14px;
    transition:background .15s;
  }
  .cart-trigger:active{background:var(--pink-soft);transform:scale(.99);}
  .cart-trigger::after{content:"▾";color:var(--lav);font-size:12px;opacity:.55;margin-left:auto;flex:none;transition:transform .2s;}
  .cartbar.up .cart-trigger::after{transform:rotate(180deg);}

  /* merchant form */
  .formcard{background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px;}
  .formcard h3{margin:0 0 12px;font-size:18px;color:var(--lav);}
  /* 设置卡：公众号通知开关（独立类名，避免与顶部 .switch 冲突） */
  .settcard{background:var(--cream);border-radius:20px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:16px;}
  .settrow{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .setttext{flex:1;min-width:0;}
  .setttitle{font-size:15px;font-weight:600;color:var(--ink);}
  .settinfo{font-size:12px;color:#a99bb8;margin-top:2px;}
  .togglesw{position:relative;display:inline-block;width:52px;height:30px;flex:none;}
  .togglesw input{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer;z-index:2;}
  .togglesw .track{position:absolute;inset:0;background:#e3d9ec;border-radius:999px;transition:.22s;pointer-events:none;}
  .togglesw .track:before{content:"";position:absolute;left:3px;top:3px;height:24px;width:24px;background:#fff;border-radius:50%;transition:.22s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .togglesw input:checked + .track{background:linear-gradient(135deg,var(--pink),var(--lav));}
  .togglesw input:checked + .track:before{transform:translateX(22px);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:13px;color:#8a7a7a;margin-bottom:5px;}
  .field input,.field select{
    width:100%;padding:11px 12px;border-radius:14px;border:2px solid var(--pink-soft);
    font-family:inherit;font-size:16px;background:var(--cream);color:var(--ink);outline:none;transition:.2s;
  }
  .field input:focus,.field select:focus{border-color:var(--pink);background:#fff;}
  .upload{
    border:2px dashed var(--lav);border-radius:16px;padding:14px;text-align:center;
    cursor:pointer;color:var(--lav);font-size:14px;background:var(--lav-soft);transition:.2s;
    font-family:inherit;width:100%;box-sizing:border-box;display:block;
  }
  .upload:hover{background:var(--pink-soft);}
  .upload:active{transform:scale(.98);}
  .upload:focus-visible{outline:3px solid var(--pink);outline-offset:2px;}
  .preview-img{width:70px;height:70px;border-radius:14px;object-fit:cover;margin-top:10px;border:2px solid var(--pink-soft);}
  .img-remove{margin-top:8px;border:none;background:var(--lav-soft);color:var(--lav);font-family:inherit;font-size:13px;padding:6px 12px;border-radius:12px;cursor:pointer;}
  .img-remove:active{transform:scale(.96);}
  .search{
    margin:10px 2px 0;padding:11px 14px;border:2px solid var(--pink-soft);border-radius:14px;
    font-family:inherit;font-size:14px;color:var(--ink);background:#fff;box-sizing:border-box;width:calc(100% - 4px);
  }
  .search:focus-visible{outline:3px solid var(--pink);outline-offset:2px;}
  .savebtn{
    width:100%;border:none;cursor:pointer;font-family:inherit;font-size:17px;color:#fff;
    background:linear-gradient(135deg,var(--mint),var(--pink));
    padding:13px;border-radius:18px;box-shadow:var(--shadow);transition:.15s;
  }
  .savebtn:active{transform:scale(.97);}

  /* merchant list */
  .mlist .mrow{
    background:#fff;border-radius:18px;padding:10px;display:flex;align-items:center;gap:10px;
    box-shadow:var(--shadow);margin-bottom:12px;
  }
  .mlist .mimg{width:54px;height:54px;border-radius:14px;object-fit:cover;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:28px;flex:0 0 auto;}
  /* 无图菜品：按菜名智能生成的粉彩渐变可爱图案 */
  .em{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.72);border-radius:50%;box-shadow:0 3px 8px rgba(0,0,0,.07);line-height:1;}
  .card .img .em{width:108px;height:108px;font-size:58px;}
  .mlist .mimg .em{width:38px;height:38px;font-size:22px;}
  .mlist .minfo{flex:1;min-width:0;}
  .mlist .mname{font-size:15px;}
  .mlist .mprice{font-size:14px;color:var(--pink);}
  .mlist .mprice input{
    width:74px;padding:5px 6px;border-radius:10px;border:2px solid var(--pink-soft);
    font-family:inherit;font-size:16px;text-align:center;background:var(--cream);color:var(--ink);
  }
  .iconbtn{border:none;background:var(--pink-soft);color:var(--pink);width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:16px;flex:0 0 auto;}
  .iconbtn.del{background:#FFE0E0;color:#ff7a7a;}

  .empty{text-align:center;color:#aa9999;padding:40px 0;font-size:15px;}

  /* modal */
  .overlay{
    position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(90,74,82,.45);z-index:20;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .sheet{
    background:#fff;width:100%;max-width:430px;border-top-left-radius:28px;border-top-right-radius:28px;
    padding:20px 18px 26px;max-height:82dvh;max-height:82vh;overflow-y:auto;animation:slideUp .3s ease;
  }
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h3{margin:0 0 14px;font-size:20px;color:var(--pink);display:flex;align-items:center;gap:8px;}
  .oline{display:flex;justify-content:space-between;padding:9px 2px;border-bottom:1px dashed var(--pink-soft);font-size:15px;}
  .bigpay{width:100%;border:none;cursor:pointer;font-family:inherit;font-size:18px;color:#fff;background:linear-gradient(135deg,var(--pink),var(--lav));padding:14px;border-radius:20px;box-shadow:var(--shadow-lg);}
  .bigpay:active{transform:scale(.97);}

  /* 购物车详情弹窗里的商品行 */
  .cart-row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px dashed var(--pink-soft);}
  .cart-row:last-child{border-bottom:none;}
  .cr-emoji{font-size:30px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--cream);border-radius:14px;flex:none;line-height:1;}
  .cr-info{flex:1;min-width:0;}
  .cr-name{font-size:15px;color:var(--ink);font-weight:600;line-height:1.25;word-break:break-all;}
  .cr-price{font-size:12px;color:#a99;margin-top:3px;}
  .cr-stepper{display:flex;align-items:center;gap:6px;flex:none;}
  .cr-stepper button{width:30px;height:30px;border-radius:50%;border:none;background:var(--pink-soft);color:var(--pink);font-size:16px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;transition:.12s;}
  .cr-stepper button:active{transform:scale(.88);background:var(--pink);color:#fff;}
  .cr-stepper span{min-width:20px;text-align:center;font-size:14px;color:var(--ink);font-weight:600;}
  .cr-del{margin-left:4px;width:30px;height:30px;border-radius:50%;border:none;background:#FFE0E0;color:#ff7a7a;font-size:14px;cursor:pointer;flex:none;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;transition:.12s;}
  .cr-del:active{transform:scale(.88);background:#ff7a7a;color:#fff;}
  .cart-empty{padding:30px 10px;text-align:center;color:#a99;font-size:14px;}

  /* 自定义确认弹窗 */
  .confirm-bg{
    position:fixed;inset:0;background:rgba(90,74,82,.45);z-index:30;
    display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .15s ease;
  }
  .confirm-box{
    background:#fff;width:100%;max-width:320px;border-radius:22px;padding:22px 20px 18px;
    box-shadow:var(--shadow-lg);text-align:center;animation:popIn .18s ease;
  }
  .confirm-box .ctitle{font-size:18px;color:var(--pink);margin-bottom:8px;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:6px;}
  .confirm-box .cmsg{font-size:14px;color:#665;line-height:1.5;margin-bottom:18px;}
  .confirm-box .cbtns{display:flex;gap:12px;}
  .confirm-box .cbtn{flex:1;border:none;cursor:pointer;font-family:inherit;font-size:15px;padding:11px;border-radius:14px;transition:.15s;}
  .confirm-box .cbtn:active{transform:scale(.97);}
  .confirm-box .c-cancel{background:var(--cream);color:#887;}
  .confirm-box .c-ok{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff;}
  .confirm-box .c-ok.danger{background:linear-gradient(135deg,#ff8a8a,#ff6b8a);}
  @keyframes popIn{from{transform:scale(.9);opacity:.6;}to{transform:scale(1);opacity:1;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  /* success */
  .success{text-align:center;padding:20px 10px;}
  .check{
    width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--mint),var(--pink));
    margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:48px;color:#fff;
    animation:pop .5s cubic-bezier(.18,1.4,.4,1);box-shadow:var(--shadow-lg);
  }
  @keyframes pop{0%{transform:scale(0);}100%{transform:scale(1);}}
  .success h2{margin:6px 0;color:var(--pink);}
  .success .order{font-size:13px;color:#8a7a7a;margin-top:6px;}
  .heart{position:fixed;font-size:22px;animation:rise 1.4s ease-out forwards;pointer-events:none;z-index:30;}
  @keyframes rise{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-120px) scale(1.4);}}

  .toast{
    position:fixed;left:50%;bottom:120px;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;z-index:40;
    opacity:0;transition:.3s;pointer-events:none;
  }
  .toast.show{opacity:.95;}

  /* 启动加载遮罩 + 云端同步提示 */
  .loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#fffdfb;color:#bba;font-size:15px;z-index:9;}
  .spinner{width:40px;height:40px;border:4px solid var(--pink-soft);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .sync-hint{text-align:center;color:#bba;font-size:13px;padding:6px 0 2px;}

  /* 键盘焦点指示 */
  button:focus-visible,.chip:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--pink);outline-offset:2px;}

  /* 窄屏适配 */
  @media (max-width:360px){
    .switch button{font-size:13px;padding:6px 0;}
    .grid{grid-template-columns:1fr;}
    .topbar h1{font-size:20px;}
    .topbar .sub{font-size:12px;}
  }
</style>
</head>
<body>
<div class="phone">
  <div class="deco d1">🍓</div>
  <div class="deco d2">🍡</div>
  <div class="deco d3">🍵</div>
  <div class="deco d4">🍰</div>

  <div class="topbar">
    <h1>🍡 老婆小饭桌</h1>
    <div class="sub">老婆点菜 · 想吃就点～</div>
    <div class="switch">
      <button id="btnCust" class="active" onclick="switchView('customer')">🛒 老婆点菜</button>
      <button id="btnOrder" onclick="switchView('order')">📋 老公订单</button>
      <button id="btnHistory" onclick="switchView('history')">📜 历史订单</button>
      <button id="btnMer" onclick="switchView('merchant')">🛠️ 添加菜品</button>
    </div>
  </div>

  <!-- 启动加载遮罩 -->
  <div id="appLoading" class="loading">
    <div class="spinner"></div>
    <div>菜单加载中… 🍡</div>
  </div>

  <!-- 顾客视图 -->
  <div id="customerView" class="screen">
    <div class="custHead">
      <div class="chips" id="chips"></div>
      <input id="dishSearch" class="search" placeholder="🔍 搜索菜品…" aria-label="搜索菜品" oninput="onSearch()" />
    </div>
    <div id="syncHint" class="sync-hint hidden">🔄 正在同步云端菜单…</div>
    <div class="grid" id="dishGrid"></div>
    <div id="custEmpty" class="empty hidden">还没有菜品哦，去「添加菜品」添加吧 🍰</div>
  </div>

  <!-- 商家视图 -->
  <div id="merchantView" class="screen hidden">
    <div class="formcard">
      <h3>➕ 添加菜品</h3>
      <div class="field">
        <label>菜品名称</label>
        <input id="fName" placeholder="例如：草莓大福" />
      </div>
      <div class="field">
        <label>价格（元）</label>
        <input id="fPrice" type="number" min="0" step="0.5" placeholder="例如：12" />
      </div>
      <div class="field">
        <label>分类</label>
        <select id="fCat">
          <option value="主食">🍚 主食</option>
          <option value="小食">🍡 小食</option>
          <option value="饮品">🍵 饮品</option>
          <option value="甜点">🍰 甜点</option>
          <option value="其他">✨ 其他</option>
        </select>
      </div>
      <div class="field">
        <label>一句话描述（可选）</label>
        <input id="fDesc" placeholder="例如：软软糯糯超好吃" />
      </div>
      <div class="field">
        <label>菜品图片（可选，可拍照/相册）</label>
        <button type="button" class="upload" onclick="document.getElementById('fImg').click()" aria-label="上传菜品图片">📷 点击上传图片</button>

function guessEmoji(name,cat){
  const n=(name||"").toLowerCase();
  for(const [kw,em] of EMOJI_MAP){ if(kw && n.includes(kw.toLowerCase())) return em; }
  return CAT_EMOJI[cat]||"🍽️";
}
// 按菜名稳定生成粉彩渐变（同菜名永远同色，柔和可爱）
const PASTELS=["#FFD1DC","#FFE0AC","#FFDFD3","#FBE4FF","#DBCDF0","#C6DEF1","#C9E4DE","#D4F0F0","#E2F0CB","#FFF1B6"];
function dishGradient(name){
  const s=name||"dish";let h=0;
  for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;
  const a=h%PASTELS.length;
  let b=(h>>>13)%PASTELS.length;
  if(b===a)b=(a+1)%PASTELS.length;       // 撞色时回环到相邻色，确保始终是渐变
  return `linear-gradient(135deg,${PASTELS[a]},${PASTELS[b]})`;
}

const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3dml5aGRobWt3eG1vbnZkeWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MzExNzksImV4cCI6MjEwMDIwNzE3OX0.X8vEUi37L0blomft4vwTbgIR0iYgOgL7Vij_KQHhy4U";

let wxPushEnabled=true;   // 公众号下单通知总开关，默认开；实际状态从云端（menu 表 id=wxpush 行）加载
async function loadWxPush(){

// 轻量轮询：仅同步「公众号通知开关」这一行（每 15s 一次极小 GET），让两台手机设置实时一致
async function pollWxPushSetting(){

    const v=await loadWxPush();
    if(_lastWxPush!==null && v!==_lastWxPush){

async function sbFetch(path,opts={}){
  const headers=Object.assign({
    "apikey":SB_KEY,
    "Authorization":"Bearer "+SB_KEY,
    "Content-Type":"application/json"
  },opts.headers||{});
  const res=await fetch(SB_URL+"/rest/v1/"+path,{...opts,headers});
  if(!res.ok)throw new Error("SB "+res.status);
  // 204(DELETE) / 201(return=minimal) 均无响应体，不可 json 解析，否则抛错误报失败
  if(res.status===204||res.status===201)return null;
  const ct=res.headers.get("content-type")||"";
  if(!ct.includes("application/json"))return null;
  return res.json();
}
async function loadOrdersRemote(){
  const rows=await sbFetch("orders?select=*&order=created_at.desc");

    pay:r.pay||"wechat", time:r.ord_time||new Date(r.created_at).getTime(),
    done:!!r.done, note:r.note||""
  }));
}
async function saveOrderRemote(o){
  const body={no:o.no,items:o.items,total:o.total,pay:o.pay,ord_time:o.time,done:!!o.done,note:o.note||""};
  try{
    await sbFetch("orders",{method:"POST",headers:{"Prefer":"return=minimal"},body:JSON.stringify(body)});

    const b2={...body};delete b2.note;

}

// 本地缓存秒开：先渲染本地菜单，不再干等云端
function loadMenuLocal(){
  let local=null;
  try{const raw=localStorage.getItem("cute_menu");local=raw?JSON.parse(raw):null;if(!Array.isArray(local))local=null;}catch(e){local=null;}
  menu=local&&local.length?local:DEFAULT_MENU.slice();
  cacheLocal();
}
// 后台同步云端共享菜单（或把本地推上去建共享），有变化再局部刷新当前页
async function syncMenuCloud(){
  try{
    const cloud=await loadMenuRemote();
    if(cloud!==null){
      if(menuDirty){           // 本地有未同步的改动，先把本地最新推上去；成功才清 dirty，失败保留以便下次启动重试
        try{ await save(); }catch(e){}
      }else{
        menu=cloud;cacheLocal();
      }
    }
    else{ await save(); }      // 云端还没有菜单行，上传本地作为初始共享（成功才清 dirty）
    renderCustomerIfVisible();
  }catch(e){console.warn("syncMenuCloud failed",e);}
}
function renderCustomerIfVisible(){
  if(!document.getElementById("customerView").classList.contains("hidden"))renderCustomer();
}
// 仅写本地缓存：容量不足时自动剔除图片后降级重试，避免直接弹"保存失败"
function cacheLocal(){
  try{localStorage.setItem("cute_menu",JSON.stringify(menu));}
  catch(e){
    try{
      const lite=menu.map(d=>d.image?{...d,image:null}:d);
      localStorage.setItem("cute_menu",JSON.stringify(lite));
    }catch(e2){console.warn("cacheLocal failed even without images",e2);}
  }
}
async function save(){          // 写本地缓存 + 推云端；推送成功才清 menuDirty，失败保留以便下次重试
  cacheLocal();
  try{ await saveMenuRemote(); menuDirty=false; }
  catch(e){ console.warn("saveMenuRemote failed",e); }   // 推送失败：保留 dirty，下次启动/操作会再推
}
async function loadMenuRemote(){
  const rows=await sbFetch("menu?select=data&id=eq.shared&limit=1");
  if(rows&&rows.length)return (rows[0].data||[]); // 只取 shared 行 → 返回其中的菜单（可能为空数组）
  return null;                                    // 还没有共享菜单行
}
async function saveMenuRemote(){

    method:"POST",

}

// 兜底：强制内容区高度 = 手机框高度 - 顶栏高度（应对某些 iOS WebView 下 grid/flex 高度塌陷）
function fitScreens(){
  const ph=document.querySelector(".phone");
  const tb=document.querySelector(".topbar");
  if(!ph||!tb)return;
  const avail=Math.max(0,ph.clientHeight-tb.offsetHeight);
  document.querySelectorAll(".screen").forEach(s=>{s.style.maxHeight=avail+"px";});
}
/* iOS 视觉视口兜底：用 innerHeight（含 toolbar 收缩后的真实可见高度）给手机框定高，
   绕开 100dvh/-webkit-fill-available 在老版本 iOS 上把高度解析为 0 的坑 */
function setViewportHeight(){
  const p=document.querySelector(".phone");
  if(p&&typeof window.innerHeight==="number")p.style.height=window.innerHeight+"px";
}

function renderChips(){
  const cats=["全部",...new Set(menu.map(d=>d.cat))];
  const box=document.getElementById("chips");box.innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.className="chip"+(c===curCat?" active":"");
    b.textContent=(c==="全部"?"🌈 ":CAT_EMOJI[c]||"✨ ")+c;
    b.onclick=()=>{curCat=c;renderChips();renderCustomer();};
    box.appendChild(b);
  });
}
// 单卡片数量区的 HTML（加入/加减按钮），集中维护避免重复
function cardRowHtml(d){
  const q=cart[d.id]||0;
  return q>0?`<div class="stepper">
      <button aria-label="减少数量" onclick="changeQty('${d.id}',-1)">−</button>
      <span>${q}</span>
      <button aria-label="增加数量" onclick="changeQty('${d.id}',1)">＋</button>
    </div>`:`<button class="add" aria-label="加入购物车" onclick="changeQty('${d.id}',1)">＋</button>`;
}
function renderCustomer(){
  const grid=document.getElementById("dishGrid");
  const kw=(document.getElementById("dishSearch").value||"").trim().toLowerCase();
  let list=curCat==="全部"?menu:menu.filter(d=>d.cat===curCat);
  if(kw)list=list.filter(d=>(d.name||"").toLowerCase().includes(kw)||(d.desc||"").toLowerCase().includes(kw));
  grid.innerHTML="";
  cardMap={};
  const empty=document.getElementById("custEmpty");
  empty.classList.toggle("hidden",list.length>0);
  empty.textContent = list.length===0 && kw
    ? "没有找到「"+(document.getElementById("dishSearch").value.trim())+"」相关的菜～"
    : (curCat==="全部"
        ? "还没有菜品哦，去「添加菜品」添加吧 🍰"
        : "「"+curCat+"」分类下还没有菜品～");
  list.forEach(d=>{
    const card=document.createElement("div");card.className="card";card.dataset.id=d.id;
    const em=d.emoji||guessEmoji(d.name,d.cat);
    const imgHtml=d.image?`<div class="img"><img src="${d.image}" alt="${escapeHtml(d.name)}"></div>`:`<div class="img"><div class="ph" style="background:${dishGradient(d.name)}"><span class="em">${escapeHtml(em)}</span></div></div>`;
    card.innerHTML=`
      ${d.cat?`<div class="tag">${CAT_EMOJI[d.cat]||""} ${d.cat}</div>`:""}
      ${imgHtml}
      <div class="name">${escapeHtml(d.name)}</div>
      <div class="desc">${escapeHtml(d.desc||"")}</div>
      <div class="row">
        <div class="price"><small>¥</small>${d.price}</div>
        <div class="qwrap">${cardRowHtml(d)}</div>
      </div>`;
    grid.appendChild(card);
    cardMap[d.id]=card;
  });

// iOS 键盘避让：弹窗内输入留言时键盘弹出，把表单位置上移，避免被键盘遮挡
function adjustKeyboard(){
  if(!window.visualViewport)return;
  const vv=window.visualViewport;
  const kb=Math.max(0,(window.innerHeight||document.documentElement.clientHeight)-vv.height-vv.offsetTop);
  document.querySelectorAll(".sheet").forEach(s=>{
    const ov=s.closest(".overlay");
    const visible=ov&&!ov.classList.contains("hidden");
    s.style.transform=(visible&&kb>0)?("translateY(-"+Math.max(0,kb-12)+"px)"):"";
  });
}
function showConfirm(opts){
  return new Promise(resolve=>{
    const bg=document.getElementById("confirmBg");
    const danger=opts.danger?" danger":"";
    bg.innerHTML=`
      <div class="confirm-box" role="alertdialog" aria-modal="true" aria-labelledby="cTitle">
        <div class="ctitle" id="cTitle">${opts.icon||"⚠️"} ${escapeHtml(opts.title||"确认操作")}</div>
        <div class="cmsg">${escapeHtml(opts.message||"")}</div>
        <div class="cbtns">
          <button class="cbtn c-cancel" id="cCancel">${escapeHtml(opts.cancelText||"取消")}</button>
          <button class="cbtn c-ok${danger}" id="cOk">${escapeHtml(opts.okText||"确定")}</button>
        </div>
      </div>`;
    bg.classList.remove("hidden");
    const cancel=document.getElementById("cCancel");
    const ok=document.getElementById("cOk");
    const prevFocus=document.activeElement;          // 记住打开前的焦点，关闭后归还
    const focusables=[cancel,ok];
    const onKey=e=>{
      if(e.key==="Escape"){e.preventDefault();close(false);return;}
      if(e.key==="Tab"){                              // 焦点陷阱：Tab/Shift+Tab 在弹窗内循环
        const idx=focusables.indexOf(document.activeElement);
        if(e.shiftKey){ if(idx<=0){e.preventDefault();ok.focus();} }
        else { if(idx>=focusables.length-1){e.preventDefault();cancel.focus();} }
      }
    };
    document.addEventListener("keydown",onKey);
    bg.onclick=e=>{ if(e.target===bg)close(false); };
    cancel.onclick=()=>close(false);
    ok.onclick=()=>close(true);
    ok.focus();                                       // 打开即把焦点移入弹窗
    function close(val){
      bg.classList.add("hidden");
      bg.onclick=null;
      document.removeEventListener("keydown",onKey);
      if(prevFocus&&prevFocus.focus)prevFocus.focus();
      resolve(val);
    }
  });
}

function onPickImage(e){
  const file=e.target.files[0];if(!file)return;
  const p=document.getElementById("fPreview");
  const rm=document.getElementById("fImgRemove");
  p.classList.remove("hidden");if(rm)rm.classList.remove("hidden");
  // 始终转 JPEG + 限制尺寸：跨平台可显示（HEIC 仅苹果能看）、体积可控（避免 jsonb 过大）
  compressImage(file,
    compressed=>{pickedImg=compressed;p.src=compressed;},
    raw=>{ if(raw){pickedImg=raw;p.src=raw;} else {pickedImg=null;p.classList.add("hidden");if(rm)rm.classList.add("hidden");} }
  );
}
function compressImage(file,cb,onerr){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const max=720;let w=img.width,h=img.height;
        if(w>max||h>max){const r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r);}
        const c=document.createElement("canvas");c.width=Math.max(1,w);c.height=Math.max(1,h);
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        cb(c.toDataURL("image/jpeg",0.82));          // 统一 JPEG：去透明、体积小、全平台可读
      }catch(err){onerr&&onerr(ev.target.result);}
    };
    img.onerror=()=>{onerr&&onerr(ev.target.result);};
    img.src=ev.target.result;
  };
  reader.onerror=()=>{onerr&&onerr();};
  reader.readAsDataURL(file);
}

  window.visualViewport.addEventListener("scroll",adjustKeyboard);
}
// 无障碍：Esc 关闭任意打开的弹窗
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")document.querySelectorAll(".overlay:not(.hidden)").forEach(o=>o.classList.add("hidden"));
});
</script>
</body>
</html>
